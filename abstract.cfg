% 中文摘要
\def\abstractzh{
本文档用于演示北京邮电大学本科毕业设计（论文）主体部分的排版方式。示例内容重点展示摘要、目录、章节结构、图表、公式、参考文献、致谢、附录与创新成果等模块在 \LaTeX{} 模板中的组织形式。

模板默认采用 A4 纸张、统一页边距、规范的页眉页脚设置以及符合本科论文常见要求的标题层级与参考文献样式。用户在实际使用时，可基于本模板替换题目、摘要、正文、参考文献和附录内容，并根据学院最新要求进行针对性调整。
}

% 中文关键词，建议使用空格分隔 3--5 个关键词
\def\keywordszh{本科论文模板\quad \LaTeX{}排版\quad 北京邮电大学\quad 主体版示例}

% 英文摘要
\def\abstracten{
This document is an example template for the main body of a bachelor thesis at Beijing University of Posts and Telecommunications (BUPT). It demonstrates how to organize the abstract, table of contents, chapter structure, figures, tables, equations, bibliography, acknowledgments, appendices, and achievement sections in a \LaTeX{} workflow.

The template adopts a unified page layout, front-matter and main-matter page numbering, structured title styles, and a bibliography format suitable for undergraduate thesis writing. In practical use, students should replace the sample title, abstract, body text, references, and appendices with their own research content and adjust the details according to the latest college requirements.
}

% 英文关键词，建议使用两个半角空格分隔
\def\keywordsen{bachelor thesis template\quad LaTeX typesetting\quad BUPT\quad example}
